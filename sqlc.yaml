version: "2"
sql:
  - engine: postgresql
    queries: db/queries
    schema: db/migrations
    gen:
      go:
        package: store
        out: internal/store
        sql_package: pgx/v5
        emit_pointers_for_null_types: true
        emit_json_tags: false
        emit_interface: true
        emit_prepared_queries: false
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
              pointer: true
          - db_type: "timestamptz"
            go_type:
              import: "time"
              type: "Time"
          - db_type: "timestamptz"
            nullable: true
            go_type:
              import: "time"
              type: "Time"
              pointer: true
          # pgvector's `vector` type maps to pgvector-go's Vector
          # (which is itself pgx-aware via the driver registration in
          # pgvector.NewEncoder/Decoder). Nullable variant returns a
          # pointer so unembedded rows surface as nil.
          - db_type: "vector"
            go_type:
              import: "github.com/pgvector/pgvector-go"
              package: "pgvector"
              type: "Vector"
          - db_type: "vector"
            nullable: true
            go_type:
              import: "github.com/pgvector/pgvector-go"
              package: "pgvector"
              type: "Vector"
              pointer: true

name: ReeveiOS
options:
  bundleIdPrefix: dev.jdpedrie
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true

# The local Swift Package living one directory up. ReeveiOS pulls
# `ReeveKit` (non-UI) and `ReeveUI` (shared SwiftUI) from it — same
# package the Mac app consumes. No vendored copies; both apps stay
# in lockstep on shared types.
packages:
  ReeveSwift:
    path: ../ReeveSwift

# Single iOS app target. Xcode-managed signing on the free Personal
# Team — provisioning profiles auto-rotate on rebuild (see the 7-day
# expiration caveat in docs/ios-plan.md).
targets:
  ReeveiOS:
    type: application
    platform: iOS
    sources:
      - ReeveiOS
    info:
      path: ReeveiOS/Info.plist
      properties:
        CFBundleDisplayName: Reeve
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        # Connect to a self-hosted reeved over plain HTTP without
        # tripping ATS in development. Tighten when we have TLS at
        # the server.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        # Camera attachment via the composer paperclip menu's
        # "Take Photo" action; iOS requires a usage-description
        # string before showing the camera permission prompt.
        NSCameraUsageDescription: "Take a photo to attach to your conversation."
        # Optional location-grounding for basic_grounding —
        # opt-in via Settings → Privacy. Only requested when the
        # user toggles it on; iOS requires a usage-description
        # string for the prompt to fire at all.
        NSLocationWhenInUseUsageDescription: "Your approximate location can be sent with your messages so models give locale-aware answers (e.g. 'restaurants near me')."
        # Device tools — EventKit (calendar + reminders). Required
        # for the model to read/write events via the app_tools
        # plugin. Prompt fires only when a calendar tool is enabled
        # in the active profile and the model first invokes it.
        NSCalendarsUsageDescription: "Reeve can read and write calendar events when the model invokes the calendar tools you've enabled in your profile."
        NSRemindersUsageDescription: "Reeve can read and create reminders when the model invokes the reminders tools you've enabled in your profile."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.jdpedrie.ReeveiOS
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1,2"   # iPhone + iPad
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        CODE_SIGN_STYLE: Automatic
        ENABLE_PREVIEWS: YES
    dependencies:
      - package: ReeveSwift
        product: ReeveKit
      - package: ReeveSwift
        product: ReeveUI

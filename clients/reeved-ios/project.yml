name: ReeveiOS
options:
  bundleIdPrefix: dev.jdpedrie
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true

# The local Swift Package living one directory up. ReeveiOS pulls
# `ReeveKit` (non-UI) and `ReeveUI` (shared SwiftUI) from it — same
# package the Mac app consumes. No vendored copies; both apps stay
# in lockstep on shared types.
packages:
  ReeveSwift:
    path: ../ReeveSwift

# Single iOS app target. Xcode-managed signing on the free Personal
# Team — provisioning profiles auto-rotate on rebuild (see the 7-day
# expiration caveat in docs/ios-plan.md).
targets:
  ReeveiOS:
    type: application
    platform: iOS
    sources:
      - ReeveiOS
    info:
      path: ReeveiOS/Info.plist
      properties:
        CFBundleDisplayName: Reeve
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        # Connect to a self-hosted reeved over plain HTTP without
        # tripping ATS in development. Tighten when we have TLS at
        # the server.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        # Press-and-hold mic in the composer (multimodal phase 0).
        # Both strings are mandatory — iOS hard-aborts the process
        # on the first permission request without them.
        NSMicrophoneUsageDescription: "Reeve uses the microphone for press-and-hold voice dictation, transcribed locally on-device before being inserted into your message draft."
        NSSpeechRecognitionUsageDescription: "Reeve uses on-device speech recognition to transcribe your voice dictation into the message draft. Audio is not sent to any server."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.jdpedrie.ReeveiOS
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1,2"   # iPhone + iPad
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        CODE_SIGN_STYLE: Automatic
        ENABLE_PREVIEWS: YES
    dependencies:
      - package: ReeveSwift
        product: ReeveKit
      - package: ReeveSwift
        product: ReeveUI

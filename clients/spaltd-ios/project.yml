name: SpaltiOS
options:
  bundleIdPrefix: dev.jdpedrie
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true

# The local Swift Package living one directory up. SpaltiOS pulls
# `SpaltKit` (non-UI) and `SpaltUI` (shared SwiftUI) from it — same
# package the Mac app consumes. No vendored copies; both apps stay
# in lockstep on shared types.
packages:
  SpaltSwift:
    path: ../SpaltSwift

# Single iOS app target. Xcode-managed signing on the free Personal
# Team — provisioning profiles auto-rotate on rebuild (see the 7-day
# expiration caveat in docs/ios-plan.md).
targets:
  SpaltiOS:
    type: application
    platform: iOS
    sources:
      - SpaltiOS
    info:
      path: SpaltiOS/Info.plist
      properties:
        CFBundleDisplayName: Spalt
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        # Connect to a self-hosted spaltd over plain HTTP without
        # tripping ATS in development. Tighten when we have TLS at
        # the server.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        # Camera attachment via the composer paperclip menu's
        # "Take Photo" action; iOS requires a usage-description
        # string before showing the camera permission prompt.
        NSCameraUsageDescription: "Take a photo to attach to your conversation."
        # Optional location-grounding for basic_grounding —
        # opt-in via Settings → Privacy. Only requested when the
        # user toggles it on; iOS requires a usage-description
        # string for the prompt to fire at all.
        NSLocationWhenInUseUsageDescription: "Your approximate location can be sent with your messages so models give locale-aware answers (e.g. 'restaurants near me')."
        # Device tools — EventKit (calendar + reminders). Required
        # for the model to read/write events via the app_tools
        # plugin. Prompt fires only when a calendar tool is enabled
        # in the active profile and the model first invokes it.
        NSCalendarsUsageDescription: "Spalt can read and write calendar events when the model invokes the calendar tools you've enabled in your profile."
        NSRemindersUsageDescription: "Spalt can read and create reminders when the model invokes the reminders tools you've enabled in your profile."
        # HealthKit — read-only access to activity, workouts, sleep,
        # vitals. The framework itself is entitlement-gated (see the
        # CODE_SIGN_ENTITLEMENTS setting below); this string is what
        # the user sees the first time a `health_*` tool runs and
        # the permission sheet appears.
        NSHealthShareUsageDescription: "Spalt can read activity, workouts, sleep, and vitals from the Health app when the model invokes the health tools you've enabled in your profile."
    entitlements:
      path: SpaltiOS/SpaltiOS.entitlements
      properties:
        # HealthKit entitlement — required for the HealthKit framework
        # to even link. No "access" sub-entitlement (clinical records
        # etc.) — we only read the standard non-clinical types.
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.jdpedrie.SpaltiOS
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1,2"   # iPhone + iPad
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        CODE_SIGN_STYLE: Automatic
        ENABLE_PREVIEWS: YES
    dependencies:
      - package: SpaltSwift
        product: SpaltKit
      - package: SpaltSwift
        product: SpaltUI

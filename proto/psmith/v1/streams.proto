syntax = "proto3";

package psmith.v1;

import "psmith/v1/types.proto";

option go_package = "github.com/jdpedrie/psmith/gen/psmith/v1;psmithv1";

service StreamsService {
  // Server-streaming subscription. The server replays persisted chunks from
  // from_sequence (inclusive), then live-tails new chunks as they arrive.
  // The stream emits a terminal StreamRun event once status becomes terminal,
  // then closes.
  rpc SubscribeStream(SubscribeStreamRequest) returns (stream SubscribeStreamResponse);

  // Cancel an in-flight stream. Idempotent — safe to call on already-terminal runs.
  rpc CancelStream(CancelStreamRequest) returns (CancelStreamResponse);

  // Status snapshot for a stream run.
  rpc GetStreamRun(GetStreamRunRequest) returns (GetStreamRunResponse);

  // Returns currently-running stream_runs the caller owns. Used by the
  // iOS StreamHub to discover in-flight turns on app launch /
  // conversations-list refresh and on conversation entry — so a user
  // who left mid-generation and came back sees the live state
  // immediately, instead of an empty chain that fills in on the next
  // refresh. Optional `conversation_id` filter scopes to one
  // conversation; omitted returns every active run for the user.
  rpc ListActiveRuns(ListActiveRunsRequest) returns (ListActiveRunsResponse);
}

message SubscribeStreamRequest {
  string stream_run_id = 1;
  // Inclusive starting cursor. Use 0 to replay from the beginning.
  int64 from_sequence = 2;
}

message SubscribeStreamResponse {
  oneof event {
    Chunk chunk = 1;
    // Sent exactly once when the run reaches a terminal status; the stream closes after this.
    StreamRun terminal = 2;
  }
}

message CancelStreamRequest {
  string stream_run_id = 1;
}
message CancelStreamResponse {}

message GetStreamRunRequest {
  string stream_run_id = 1;
}
message GetStreamRunResponse {
  StreamRun stream_run = 1;
}

message ListActiveRunsRequest {
  // When set, filter results to this conversation. When omitted, every
  // active run the caller owns is returned.
  optional string conversation_id = 1;
}
message ListActiveRunsResponse {
  repeated StreamRun runs = 1;
}

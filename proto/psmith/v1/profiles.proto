syntax = "proto3";

package psmith.v1;

import "psmith/v1/types.proto";

option go_package = "github.com/jdpedrie/psmith/gen/psmith/v1;psmithv1";

service ProfilesService {
  rpc CreateProfile(CreateProfileRequest) returns (CreateProfileResponse);
  rpc ListProfiles(ListProfilesRequest) returns (ListProfilesResponse);
  rpc GetProfile(GetProfileRequest) returns (GetProfileResponse);
  rpc UpdateProfile(UpdateProfileRequest) returns (UpdateProfileResponse);
  rpc DeleteProfile(DeleteProfileRequest) returns (DeleteProfileResponse);

  // Marks a profile as the user's default (clearing any previous
  // default), or clears the default entirely when profile_id is empty.
  rpc SetDefaultProfile(SetDefaultProfileRequest) returns (SetDefaultProfileResponse);

  // List the chat-plugin types compiled into this server. The set is fixed
  // at build time (registered in init()); callers consult this to render
  // config UIs and to validate plugin names before SetProfilePlugins.
  rpc ListPluginTypes(ListPluginTypesRequest) returns (ListPluginTypesResponse);

  // Read a profile's plugin pipeline. Does NOT walk the parent chain — this
  // returns the rows attached to THIS profile. Use the empty list as the
  // signal to inherit from the parent (per "all-or-nothing" semantics in
  // the architecture doc).
  rpc GetProfilePlugins(GetProfilePluginsRequest) returns (GetProfilePluginsResponse);

  // Atomically replace a profile's plugin pipeline. The request's repeated
  // `plugins` field defines the order — index 0 runs first. Each plugin's
  // config is validated by attempting to construct it; an unknown plugin
  // name or malformed config aborts the replace before any DB change.
  rpc SetProfilePlugins(SetProfilePluginsRequest) returns (SetProfilePluginsResponse);

  // Read the calling user's global config blob for one plugin. Used by
  // the "Plugin settings" UI to seed the form with previously-saved
  // values for fields the plugin marks `Global=true`. Empty / missing
  // row returns an empty config (`{}`).
  rpc GetUserPluginSettings(GetUserPluginSettingsRequest) returns (GetUserPluginSettingsResponse);
  // List every plugin the calling user has stored a global config for.
  // Drives the "Plugin settings" landing page; absence of an entry for
  // a registered plugin means "not yet configured globally".
  rpc ListUserPluginSettings(ListUserPluginSettingsRequest) returns (ListUserPluginSettingsResponse);
  // Replace the calling user's global config blob for one plugin.
  // Idempotent (insert-or-update). Empty config (`{}`) is a valid
  // stored value — it means "the user explicitly cleared every global
  // field" and overrides the absence-is-empty fallback at merge time.
  rpc UpsertUserPluginSettings(UpsertUserPluginSettingsRequest) returns (UpsertUserPluginSettingsResponse);

  // --- User-level MCP server registry ------------------------------------
  // Registered servers surface as pseudo-plugins named "mcp:<id>" in
  // ListPluginTypes. Attaching one to a profile/conversation pipeline
  // stores only that reference; the server resolves the full (secret-
  // bearing) spec from the registry at pipeline-build time, so auth
  // headers and env vars live in exactly one encrypted row.
  rpc ListMCPServers(ListMCPServersRequest) returns (ListMCPServersResponse);
  // Create (empty id) or update (owner-checked id) one registered
  // server. See UpsertMCPServerRequest for the secret-field semantics.
  rpc UpsertMCPServer(UpsertMCPServerRequest) returns (UpsertMCPServerResponse);
  // Delete a registered server. Pipeline rows referencing it are left
  // in place and degrade to a quiet no-op (the pseudo-plugin resolves
  // to an unconfigured instance); editors can render them as dangling.
  rpc DeleteMCPServer(DeleteMCPServerRequest) returns (DeleteMCPServerResponse);
  // Live-probe one registered server: dial it, run the MCP initialize
  // handshake + tools/list, and report the advertised tool names.
  // Surfaces connection errors the send path deliberately swallows (a
  // dead server degrades to "no tools" mid-conversation). Failure is
  // reported in the response (ok=false), not as an RPC error.
  rpc TestMCPServer(TestMCPServerRequest) returns (TestMCPServerResponse);
}

message CreateProfileRequest {
  optional string parent_profile_id = 1;
  string name = 2;
  optional string system_message = 3;
  optional string default_user_message = 4;
  optional string compression_guide = 5;
  optional CompressionMode compression_mode = 6;
  optional string compression_provider_id = 7;
  optional string compression_model_id = 8;
  optional ProfileDefaults default_settings = 9;
  optional string title_provider_id = 10;
  optional string title_model_id = 11;
  optional string title_guide = 12;
  // Free-form description; empty string treated as "no description."
  string description = 13;
  // When true, profile is hidden from the new-conversation picker.
  bool parent_only = 14;
  // When true, surface at the top of profile pickers.
  bool favorite = 15;
  // Sentinel for a non-server title generator (e.g. "apple_foundation" for
  // Mac on-device titling). See Profile.title_provider_kind.
  optional string title_provider_kind = 16;
  // Opening assistant turn shown in a fresh conversation. See
  // Profile.welcome_message.
  optional string welcome_message = 17;
}
message CreateProfileResponse {
  Profile profile = 1;
}

message ListProfilesRequest {
  // Page size. 0 preserves the legacy behavior of returning every
  // profile in one response — existing clients that treat the list as
  // a complete lookup table (parent-chain resolution, pickers) rely
  // on that. Paging clients opt in with an explicit size.
  int32 page_size = 1;
  string page_token = 2;
}
message ListProfilesResponse {
  repeated Profile profiles = 1;
  // Set when another page exists; empty on the last page (and always
  // empty for page_size = 0 requests).
  string next_page_token = 2;
}

message GetProfileRequest {
  string id = 1;
  // If true, also return the resolved profile with parent-chain inheritance applied.
  bool resolve = 2;
}
message GetProfileResponse {
  Profile profile = 1;
  optional Profile resolved = 2;  // present iff request.resolve = true
}

message UpdateProfileRequest {
  string id = 1;
  // Replace semantics on present fields. To clear a field (revert to inherit),
  // list its name in clear_fields rather than omitting it from the request.
  optional string name = 2;
  optional string system_message = 3;
  optional string default_user_message = 4;
  optional string compression_guide = 5;
  optional CompressionMode compression_mode = 6;
  optional string compression_provider_id = 7;
  optional string compression_model_id = 8;
  optional ProfileDefaults default_settings = 9;
  repeated string clear_fields = 10;
  optional string title_provider_id = 11;
  optional string title_model_id = 12;
  optional string title_guide = 13;
  // Identity-metadata updates. All non-nullable on the row, so they're
  // wrapped here as `optional` purely so callers can leave them unchanged.
  optional string description = 14;
  optional bool parent_only = 15;
  optional bool favorite = 16;
  // Sentinel for a non-server title generator. See Profile.title_provider_kind.
  // Listed in clear_fields to revert to inherited / cloud-titled behavior.
  optional string title_provider_kind = 17;
  // Opening assistant turn for new conversations. See
  // Profile.welcome_message. Listed in clear_fields to revert.
  optional string welcome_message = 18;
  // Re-parent the profile. Pass the new parent's UUID to point at a
  // different parent; list "parent_profile_id" in clear_fields to
  // detach (the profile becomes standalone). Self-reference and
  // cycles are rejected with InvalidArgument.
  optional string parent_profile_id = 19;
}
message UpdateProfileResponse {
  Profile profile = 1;
}

message DeleteProfileRequest {
  string id = 1;
}
message DeleteProfileResponse {}

message SetDefaultProfileRequest {
  // Empty clears the default; otherwise must be a profile the caller owns.
  string profile_id = 1;
}
message SetDefaultProfileResponse {}

// --- Chat-plugin management -----------------------------------------------

// PluginCapabilities reports which opt-in interfaces a plugin type implements.
// UIs use this to decide which config knobs / preview affordances to show.
message PluginCapabilities {
  bool configurable = 1;
  bool system_prompter = 2;
  bool outgoing_user_transformer = 3;
  bool history_transformer = 4;
  bool chunk_transformer = 5;
  bool display_transformer = 6;
  bool tool_provider = 7;
  // Mirrors OutgoingUserTransformer for the assistant side: rewrites
  // assistant content at materialization time, persisted on the row.
  bool assistant_content_transformer = 8;
  // Fires after each message persist (user, assistant, compression
  // summary) in a detached goroutine. Use cases: embedding generation,
  // webhooks, auto-tagging, audit logs.
  bool message_lifecycle_hook = 9;
  // Plugin opts into device-supplied facts (location, locale,
  // platform, etc.) on every outgoing user turn. The actual list
  // of requested fact keys is on `PluginType.requested_device_facts`
  // — this flag is the cheap "should the client even look?" gate.
  bool device_fact_requester = 10;
  // Plugin emits structured UIFragments via the ContentRenderer
  // pipeline. UIs surface this as the "Renderer" capability chip;
  // see plugins/CONTENT_RENDERERS.md for the component vocabulary.
  bool content_renderer = 11;
}

// PluginType is one entry in the server's compiled-in plugin registry.
message PluginType {
  string name = 1;
  string description = 2;
  // Flat list of typed fields describing the per-instance config blob the
  // plugin accepts. Empty when the plugin doesn't implement Configurable.
  repeated ConfigField config_fields = 3;
  PluginCapabilities capabilities = 4;
  // Human-friendly label shown everywhere in the UI (e.g. "Brave Search").
  // The `name` field above is the stable machine identifier used as the
  // plugin's primary key.
  string display_name = 5;
  // Device facts the plugin wants on every outgoing user turn.
  // Empty unless `capabilities.device_fact_requester` is true. The
  // client unions this list across enabled plugins on the active
  // profile; values it can gather (with permission as needed) ride
  // back on `SendMessageRequest.device_facts`.
  repeated DeviceFactKey requested_device_facts = 6;
  // Model capabilities the plugin needs from the conversation's assigned
  // model. Sparse: any field left false is "no requirement here." Auto-
  // derived: every plugin with `capabilities.tool_provider == true` reports
  // `tool_use = true` here too. Plugins with extra needs (e.g. an image-
  // generating plugin) implement an additional CapabilityRequirer hook
  // server-side. UIs filter the model picker by the union across a
  // profile's pipeline; the server validates at SendMessage time.
  optional ModelCapabilities required_model_capabilities = 7;
}

// ConfigField is one entry in a plugin's per-instance config descriptor.
// The list is flat — there's no nesting — so a UI can render a form by
// walking the array once.
message ConfigField {
  enum Type {
    TYPE_UNSPECIFIED = 0;
    NUMBER = 1;
    TEXT = 2;
    TEXTAREA = 3;
    BOOLEAN = 4;
    SELECT = 5;
    // MODEL_PICKER renders the same model chooser the
    // conversation composer uses, optionally filtered by a
    // capability flag (see `model_picker_filter`). The stored
    // value is a JSON object `{"provider_id":"…","model_id":"…"}`
    // — provider_id is the user_model_provider id and model_id
    // is the catalog model id, mirroring how the conversation
    // settings persist a chosen model.
    MODEL_PICKER = 6;
  }
  string name = 1;
  string display = 2;
  string description = 3;
  Type type = 4;
  // JSON-encoded default value (e.g. `1`, `"<choices>"`, `true`). Empty = no default.
  string default_json = 5;
  // Populated only when type == SELECT.
  repeated ConfigOption options = 6;
  // Populated only when type == MODEL_PICKER. Hints to the UI
  // which models to surface in the picker. Multiple flags AND
  // (a model must satisfy every flag set to true). Empty / all-
  // false = no filter, surface every user_model.
  optional ModelPickerFilter model_picker_filter = 9;
  // True when the form must collect a value before the plugin can be
  // saved. UIs disable the parent Save button and show inline validation
  // when a required field is empty. The plugin's constructor remains
  // the authoritative validator at runtime.
  bool required = 7;
  // True when this field lives at user scope rather than profile scope
  // (e.g. credentials the user only wants to enter once across every
  // profile that uses the plugin). UIs render global fields on a
  // separate "Plugin settings" surface; the per-profile plugin form
  // omits them. The server merges the user's stored global value into
  // the per-profile config blob handed to the plugin constructor at
  // pipeline-build time.
  bool global = 8;
  // How this field's value combines across the resolver's layered view
  // (root profile → leaf profile → conversation override). Default is
  // REPLACE (leaf wins). APPEND_STRING fields concatenate every non-empty
  // contribution root-to-leaf, blank-line separated. UIs use this to
  // hint the user that their entry will be added on top of whatever
  // the chain already contributes, not replace it.
  Merge merge = 10;
  enum Merge {
    MERGE_UNSPECIFIED = 0;   // treated as REPLACE
    MERGE_REPLACE = 1;
    MERGE_APPEND_STRING = 2;
  }
  // Optional grouping header the UI renders above the field.
  // Empty = ungrouped (rendered alongside top-level fields).
  // Plugins with many fields of the same kind (app_tools'
  // per-tool toggles bundled by capability — Calendar /
  // Reminders / etc.) populate this to keep the form scannable.
  string category = 11;
}

// ConfigOption is one entry in a SELECT field's options list.
message ConfigOption {
  string value = 1;
  string label = 2;
}

// ModelPickerFilter constrains which user_models a MODEL_PICKER
// field surfaces. Any flag set to `true` is a hard requirement;
// all flags ANDed together. Empty = surface every user_model.
message ModelPickerFilter {
  bool requires_streaming = 1;
  bool requires_thinking = 2;
  bool requires_tool_use = 3;
  bool requires_vision = 4;
  bool requires_prompt_caching = 5;
  // Picks only models that produce image output (e.g. for
  // `imagegen`, `nano-banana`, `dall-e-3`).
  bool requires_generates_images = 6;
}

// ProfilePlugin is one row in a profile's pipeline. On input to
// SetProfilePlugins, `ordinal` is ignored — the request's list order is
// authoritative. On output, `ordinal` reflects the persisted position
// (0-indexed).
message ProfilePlugin {
  string plugin_name = 1;
  int32 ordinal = 2;
  bytes config = 3;
  // When true, the resolver drops any same-named plugin inherited
  // from this profile's parent chain. Lets a child profile detach
  // an inherited plugin without cloning the parent's whole pipeline.
  bool disabled = 4;
}

message ListPluginTypesRequest {}
message ListPluginTypesResponse {
  repeated PluginType plugin_types = 1;
}

message GetProfilePluginsRequest {
  string profile_id = 1;
}
message GetProfilePluginsResponse {
  repeated ProfilePlugin plugins = 1;
}

message SetProfilePluginsRequest {
  string profile_id = 1;
  repeated ProfilePlugin plugins = 2;
}
message SetProfilePluginsResponse {
  repeated ProfilePlugin plugins = 1;
}

// --- User-scoped plugin settings (`Global` config fields) ----------------

// One stored global-config blob for a (calling user, plugin) pair.
message UserPluginSettings {
  string plugin_name = 1;
  // Raw JSON object. Caller-responsible for matching the plugin type's
  // `Global=true` ConfigField shape.
  bytes config = 2;
}

message GetUserPluginSettingsRequest {
  string plugin_name = 1;
}
message GetUserPluginSettingsResponse {
  UserPluginSettings settings = 1;
}

message ListUserPluginSettingsRequest {}
message ListUserPluginSettingsResponse {
  repeated UserPluginSettings settings = 1;
}

message UpsertUserPluginSettingsRequest {
  string plugin_name = 1;
  bytes config = 2;
}
message UpsertUserPluginSettingsResponse {
  UserPluginSettings settings = 1;
}

// --- User-level MCP server registry --------------------------------------

// One registered MCP server. The stored spec uses the same field
// vocabulary as the mcp plugin's config blob, so pipeline-build
// resolution is a straight merge. Secret-bearing fields (env, headers)
// are write-only on this surface: reads return has_env / has_headers
// flags instead of values, mirroring how provider API keys are
// withheld from clients.
message MCPServer {
  string id = 1;
  // Display name, unique per user. Doubles as the pseudo-plugin's
  // display_name in ListPluginTypes.
  string name = 2;
  // "stdio", "http", or "inproc".
  string transport = 3;
  // stdio: executable resolved against PATH.
  string command = 4;
  // stdio: one CLI arg per line.
  string args = 5;
  // stdio: KEY=VALUE lines are stored (encrypted) but never returned.
  bool has_env = 6;
  // http: JSON-RPC endpoint.
  string url = 7;
  // http: "KEY: VALUE" header lines are stored (encrypted) but never
  // returned.
  bool has_headers = 8;
  // Default tool-name prefix wherever this server is attached; a
  // per-attachment config can still override it.
  string tool_prefix = 9;
}

message ListMCPServersRequest {}
message ListMCPServersResponse {
  repeated MCPServer servers = 1;
}

message UpsertMCPServerRequest {
  // Empty = create; non-empty = update that row (NotFound unless the
  // caller owns it).
  string id = 1;
  string name = 2;
  string transport = 3;
  string command = 4;
  string args = 5;
  // KEY=VALUE per line. ABSENT keeps the stored value — an edit form
  // that never displays secrets can save without wiping them.
  // Present-but-empty clears.
  optional string env = 6;
  string url = 7;
  // "KEY: VALUE" per line. Same absent-keeps semantics as env.
  optional string headers = 8;
  string tool_prefix = 9;
}
message UpsertMCPServerResponse {
  MCPServer server = 1;
}

message DeleteMCPServerRequest {
  string id = 1;
}
message DeleteMCPServerResponse {}

message TestMCPServerRequest {
  string id = 1;
}
message TestMCPServerResponse {
  bool ok = 1;
  // Populated when ok is false.
  string error_message = 2;
  // The server's advertised tools (before any tool_prefix), when ok.
  repeated string tool_names = 3;
}

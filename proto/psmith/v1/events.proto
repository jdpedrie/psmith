syntax = "proto3";

package psmith.v1;

option go_package = "github.com/jdpedrie/psmith/gen/psmith/v1;psmithv1";

// Account-scoped server push. Lets clients react to server-side
// mutations made elsewhere (another client, MCP tools, direct DB
// edits the server is aware of) without polling. In-memory bus on
// the server side — events are lost on restart, which is fine: the
// client re-fetches state on every entry path anyway, so a missed
// push just means the next user-visible action sees the change.
service EventsService {
  // Open a long-lived server-streaming subscription for the calling
  // user's account events. The server pushes events as they fire;
  // the client closes the stream when it goes to sleep / detaches.
  // No replay — events are fire-and-forget; reconnection starts a
  // fresh subscription.
  rpc SubscribeAccountEvents(SubscribeAccountEventsRequest) returns (stream AccountEvent);
}

message SubscribeAccountEventsRequest {}

// One push from the server to the client. New event categories add
// new variants to the `kind` oneof; clients ignore variants they
// don't understand, so server can ship new events without breaking
// older builds.
message AccountEvent {
  oneof kind {
    // A profile owned by the calling user was mutated. Carries the
    // id + change shape so a client that already has that profile
    // loaded can be targeted in its refresh; clients without that
    // granularity can refresh the full list.
    ProfileChanged profile_changed = 1;
    // A conversation owned by the calling user was mutated — content
    // (sends, terminals, edits, deletes, compaction), metadata
    // (title, settings, archive state), or existence. Fires for
    // mutations from EVERY server-side path, including the ones this
    // client itself performed — receivers make their reaction cheap
    // (staleness check before any heavy re-fetch) rather than rely
    // on echo suppression.
    ConversationChanged conversation_changed = 2;
    // A model provider owned by the calling user was mutated —
    // creation, config update, deletion, or any change to its models
    // (enable/disable, metadata edits, default settings, favorites).
    // Model-level changes report the OWNING provider: clients reload
    // provider+model state wholesale, so finer granularity would buy
    // nothing.
    ProviderChanged provider_changed = 3;
  }
}

message ProviderChanged {
  string provider_id = 1;
  ProviderChangeKind kind = 2;
}

enum ProviderChangeKind {
  PROVIDER_CHANGE_KIND_UNSPECIFIED = 0;
  PROVIDER_CHANGE_KIND_CREATED = 1;
  PROVIDER_CHANGE_KIND_UPDATED = 2;
  PROVIDER_CHANGE_KIND_DELETED = 3;
}

message ConversationChanged {
  string conversation_id = 1;
  ConversationChangeKind kind = 2;
}

enum ConversationChangeKind {
  CONVERSATION_CHANGE_KIND_UNSPECIFIED = 0;
  CONVERSATION_CHANGE_KIND_CREATED = 1;
  // Any mutation of an existing conversation: messages, title,
  // settings, contexts, archive state. Clients refresh the list row
  // and, if the conversation is open, run a staleness check.
  CONVERSATION_CHANGE_KIND_UPDATED = 2;
  CONVERSATION_CHANGE_KIND_DELETED = 3;
}

message ProfileChanged {
  string profile_id = 1;
  ProfileChangeKind kind = 2;
}

enum ProfileChangeKind {
  PROFILE_CHANGE_KIND_UNSPECIFIED = 0;
  PROFILE_CHANGE_KIND_CREATED = 1;
  PROFILE_CHANGE_KIND_UPDATED = 2;
  PROFILE_CHANGE_KIND_DELETED = 3;
}

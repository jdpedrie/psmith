syntax = "proto3";

package psmith.v1;

import "google/protobuf/timestamp.proto";
import "psmith/v1/types.proto";

option go_package = "github.com/jdpedrie/psmith/gen/psmith/v1;psmithv1";

service ModelProvidersService {
  // ----- Driver types and provider templates -----

  // Driver types compiled into this server build.
  rpc ListProviderTypes(ListProviderTypesRequest) returns (ListProviderTypesResponse);

  // Provider templates surfaced from the catalog (for "add provider" UX).
  rpc ListProviderTemplates(ListProviderTemplatesRequest) returns (ListProviderTemplatesResponse);

  // ----- User-configured providers (CRUD) -----

  rpc CreateUserModelProvider(CreateUserModelProviderRequest) returns (CreateUserModelProviderResponse);
  rpc ListUserModelProviders(ListUserModelProvidersRequest) returns (ListUserModelProvidersResponse);
  rpc GetUserModelProvider(GetUserModelProviderRequest) returns (GetUserModelProviderResponse);
  rpc UpdateUserModelProvider(UpdateUserModelProviderRequest) returns (UpdateUserModelProviderResponse);
  rpc DeleteUserModelProvider(DeleteUserModelProviderRequest) returns (DeleteUserModelProviderResponse);

  // ----- Model discovery and enablement -----

  // Calls the driver to discover the provider's currently-offered models,
  // enriched with catalog metadata where available. May be slow.
  rpc DiscoverModels(DiscoverModelsRequest) returns (DiscoverModelsResponse);

  // Idempotent — snapshots metadata at the moment of enabling. Server is
  // authoritative for the snapshot source (catalog or driver discovery).
  rpc EnableModels(EnableModelsRequest) returns (EnableModelsResponse);

  // Idempotent — drops the rows. Disabling does not affect any historical
  // messages or stream runs that referenced these models.
  rpc DisableModels(DisableModelsRequest) returns (DisableModelsResponse);

  // Per-instance enabled models.
  rpc ListUserModels(ListUserModelsRequest) returns (ListUserModelsResponse);

  // Flat list of all enabled models across the user's configured providers.
  // Drives the model picker.
  rpc ListAllUserModels(ListAllUserModelsRequest) returns (ListAllUserModelsResponse);

  // Toggle the favorite flag on a single user model. Identity metadata —
  // surfaces the model in the FAVORITES section of the model picker.
  rpc ToggleUserModelFavorite(ToggleUserModelFavoriteRequest) returns (ToggleUserModelFavoriteResponse);

  // Mutate fields on an enabled user model. Currently only `default_settings`
  // is writable (per-model default CallSettings layer). The model row must
  // already exist (callers can't update a model they haven't enabled).
  rpc UpdateUserModel(UpdateUserModelRequest) returns (UpdateUserModelResponse);

  // Add a manually-described model to a user provider. For models not in
  // the catalog and not surfaced by driver discovery — e.g. private
  // fine-tunes, renamed-but-real models, or anything served by an
  // openai-compatible endpoint that doesn't list them via /v1/models. The
  // resulting row carries `metadata_source = 'manual'`. Caller must own the
  // provider; (provider_id, model_id) must not already exist.
  rpc AddManualModel(AddManualModelRequest) returns (AddManualModelResponse);

  // ----- Connection / responsiveness checks -----

  // Verifies a provider's auth + reachability by calling DiscoverModels.
  // Free for all current drivers (catalog/Anthropic static, openai-compatible
  // /v1/models). Failures are reported in the response (ok=false) rather than
  // as RPC errors so the UI can render them inline.
  rpc TestUserModelProvider(TestUserModelProviderRequest) returns (TestUserModelProviderResponse);

  // Sends a tiny "Reply with the single word OK." prompt to the named model
  // and reports latency, tokens, and a sample of the reply. Bills a few
  // tokens. Failures are packed into the response, not raised as RPC errors.
  rpc TestUserModel(TestUserModelRequest) returns (TestUserModelResponse);

  // ----- Catalog management -----

  // Admin-only. Synchronously fetches models.dev and upserts catalog tables.
  rpc RefreshModelCatalog(RefreshModelCatalogRequest) returns (RefreshModelCatalogResponse);

  // Read-only status snapshot.
  rpc GetCatalogStatus(GetCatalogStatusRequest) returns (GetCatalogStatusResponse);

  // ----- Cost ledger -----

  // Per-provider running totals across the cost_events ledger. One row per
  // configured provider — including providers with zero events to date so
  // the UI can render "$0.0000" rather than silently hiding them. Drives
  // the iOS Settings → Cost screen.
  rpc ListProviderCosts(ListProviderCostsRequest) returns (ListProviderCostsResponse);
}

// --- Driver types & templates ---

message ListProviderTypesRequest {}
message ListProviderTypesResponse {
  repeated ProviderType types = 1;
}

message ListProviderTemplatesRequest {}
message ListProviderTemplatesResponse {
  repeated ProviderTemplate templates = 1;
}

// --- UserModelProvider CRUD ---

message CreateUserModelProviderRequest {
  string type = 1;
  string label = 2;
  bytes config = 3;
}
message CreateUserModelProviderResponse {
  UserModelProvider provider = 1;
}

message ListUserModelProvidersRequest {}
message ListUserModelProvidersResponse {
  repeated UserModelProvider providers = 1;
}

message GetUserModelProviderRequest {
  string id = 1;
}
message GetUserModelProviderResponse {
  UserModelProvider provider = 1;
  repeated UserModel enabled_models = 2;
}

message UpdateUserModelProviderRequest {
  string id = 1;
  optional string label = 2;
  optional bytes config = 3;
  // Replace (not merge) the provider-level default CallSettings. Unset
  // leaves the column alone; sending an empty CallSettings clears it.
  optional CallSettings default_settings = 4;
}
message UpdateUserModelProviderResponse {
  UserModelProvider provider = 1;
}

message DeleteUserModelProviderRequest {
  string id = 1;
}
message DeleteUserModelProviderResponse {}

// --- Discovery & enablement ---

message DiscoverModelsRequest {
  string user_model_provider_id = 1;
}
// Discovered models are not persisted by this RPC — they're presented to the
// user for selection. Pass the chosen subset to EnableModels.
message DiscoverModelsResponse {
  // Model IDs available, with metadata enriched from catalog where known.
  repeated DiscoveredModel models = 1;
}
message DiscoveredModel {
  string model_id = 1;
  string display_name = 2;
  optional int32 context_window = 3;
  optional int32 max_output_tokens = 4;
  optional ModelPricing pricing = 5;
  optional string knowledge_cutoff = 6;
  repeated string modalities = 7;
  optional ModelCapabilities capabilities = 8;
  MetadataSource metadata_source = 9;  // where the metadata came from
  bool already_enabled = 10;
}

message EnableModelsRequest {
  string user_model_provider_id = 1;
  repeated string model_ids = 2;
}
message EnableModelsResponse {
  repeated UserModel enabled = 1;
}

message DisableModelsRequest {
  string user_model_provider_id = 1;
  repeated string model_ids = 2;
}
message DisableModelsResponse {}

message ListUserModelsRequest {
  string user_model_provider_id = 1;
}
message ListUserModelsResponse {
  repeated UserModel models = 1;
}

message ListAllUserModelsRequest {}
message UserModelEntry {
  UserModelProvider provider = 1;
  UserModel model = 2;
}
message ListAllUserModelsResponse {
  repeated UserModelEntry entries = 1;
}

message ToggleUserModelFavoriteRequest {
  string user_model_provider_id = 1;
  string model_id = 2;
  bool favorite = 3;
}
message ToggleUserModelFavoriteResponse {
  UserModel model = 1;
}

message UpdateUserModelRequest {
  string user_model_provider_id = 1;
  string model_id = 2;
  // Replace (not merge) the per-model default CallSettings. Unset leaves
  // the column alone; sending an empty CallSettings clears it.
  optional CallSettings default_settings = 3;
  // All other metadata fields are unset → leave the column alone, set →
  // overwrite. The wire model_id is the key and is never updatable —
  // change it by removing the row and adding a new manual row.
  optional string display_name             = 4;
  optional int32 context_window            = 5;
  optional int32 max_output_tokens         = 6;
  optional ModelPricing pricing            = 7;
  // Modalities: when `update_modalities` is true, the `modalities` array
  // replaces the column wholesale (empty = clear). When false, the column
  // is left alone. (`repeated` doesn't have field presence so we need an
  // explicit flag to distinguish "no change" from "set to empty list".)
  bool update_modalities                   = 8;
  repeated string modalities               = 9;
  optional ModelCapabilities capabilities  = 10;
  optional string knowledge_cutoff         = 11;
  // Explicit clear flags for nullable scalar columns. SetField via the
  // optional accessor is "set to value"; un-setting via `.clear*()` is
  // "no change" on the server side. To revert a column to NULL clients
  // set the corresponding clear flag to true (and leave the optional
  // value field unset). When both the value and the clear flag are
  // present the clear flag wins.
  bool clear_context_window                = 12;
  bool clear_max_output_tokens             = 13;
  bool clear_knowledge_cutoff              = 14;
}
message UpdateUserModelResponse {
  UserModel user_model = 1;
}

// AddManualModelRequest carries every snapshot field. model_id and
// display_name are required; metadata is optional and stored verbatim
// (server doesn't try to look up catalog defaults for manual models).
message AddManualModelRequest {
  string user_model_provider_id           = 1;
  string model_id                         = 2;  // required
  string display_name                     = 3;  // required
  optional int32 context_window           = 4;
  optional int32 max_output_tokens        = 5;
  optional ModelPricing pricing           = 6;
  repeated string modalities              = 7;
  optional ModelCapabilities capabilities = 8;
  optional string knowledge_cutoff        = 9;  // ISO date (YYYY-MM-DD)
  optional CallSettings default_settings  = 10;
}
message AddManualModelResponse {
  UserModel user_model = 1;
}

// --- Connection / responsiveness checks ---

message TestUserModelProviderRequest {
  string user_model_provider_id = 1;
}
message TestUserModelProviderResponse {
  bool ok = 1;
  string error_message = 2;
  int32 model_count = 3;
  int64 latency_ms = 4;
}

message TestUserModelRequest {
  string user_model_provider_id = 1;
  string model_id = 2;
  // Optional per-call settings overrides. When set, the test send
  // applies them on top of the model's default_settings before
  // dispatch — surfaces "this provider rejects temperature=2.0" or
  // "thinking requires temperature=1.0" the same way the production
  // SendMessage path would. Used by the discover-constraints
  // tooling to map the per-model constraint table empirically.
  optional CallSettings call_settings = 3;
}
message TestUserModelResponse {
  bool ok = 1;
  string error_message = 2;
  int64 latency_ms = 3;
  int32 input_tokens = 4;
  int32 output_tokens = 5;
  string sample_text = 6;
}

// --- Catalog management ---

message RefreshModelCatalogRequest {}
message RefreshModelCatalogResponse {
  int32 providers_count = 1;
  int32 models_count = 2;
  google.protobuf.Timestamp fetched_at = 3;
}

message GetCatalogStatusRequest {}
message GetCatalogStatusResponse {
  int32 providers_count = 1;
  int32 models_count = 2;
  optional google.protobuf.Timestamp last_refresh_at = 3;
}

// --- Cost ledger ---

message ListProviderCostsRequest {
  // Optional half-open window [since, until). Either bound may be omitted
  // independently — omit both for an all-time rollup. Server treats the
  // values as INCLUSIVE-since / EXCLUSIVE-until so abutting windows can be
  // composed without double-counting boundary events.
  optional google.protobuf.Timestamp since = 1;
  optional google.protobuf.Timestamp until = 2;
}
message ListProviderCostsResponse {
  repeated ProviderCost providers = 1;
  // Grand total across every provider (sum of total_cost_usd). Convenience
  // for the screen header — clients could compute it from the rows, but
  // having a server-computed value avoids floating-point reconciliation.
  double grand_total_usd = 2;
}
message ProviderCost {
  string provider_id = 1;
  string provider_label = 2;
  string provider_type = 3;
  double total_cost_usd = 4;
  // Total number of cost-incurring events recorded for this provider —
  // surfaces "X messages" in the UI subtitle without a separate roundtrip.
  int64 event_count = 5;
}

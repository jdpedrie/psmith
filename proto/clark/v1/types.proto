syntax = "proto3";

package clark.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/jdpedrie/clark/gen/clark/v1;clarkv1";

// ---------------------------------------------------------------------------
// Users & auth
// ---------------------------------------------------------------------------

message User {
  string id = 1;
  string username = 2;
  optional string display_name = 3;
  bool is_admin = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
}

// ---------------------------------------------------------------------------
// Providers — driver types and user-configured instances
// ---------------------------------------------------------------------------

// A driver type compiled into the server. Set is fixed at build time;
// adding a type requires a recompile. UIs consult ListProviderTypes to render
// configuration forms.
message ProviderType {
  string name = 1;          // 'anthropic', 'openai-compatible', 'claude-code-subprocess', ...
  string display_name = 2;
  bool stateful = 3;        // true for harness-style providers
  bytes config_schema = 4;  // JSON Schema for the type's config
}

// A user-configured instance of a driver type with credentials/endpoint/etc.
message UserModelProvider {
  string id = 1;
  string type = 2;          // driver type name
  string label = 3;
  bytes config = 4;         // driver-specific JSON
  string owner_user_id = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

// A template surfaced from the catalog to accelerate "add provider" UX.
// Pre-fills the driver_type and base URL for known compatible providers.
message ProviderTemplate {
  string catalog_provider_id = 1;   // e.g. 'groq'
  string name = 2;                  // e.g. 'Groq'
  string driver_type = 3;           // which Clark driver to use, e.g. 'openai-compatible'
  optional string api_base = 4;
  optional string env_key = 5;      // conventional env var for the API key
  optional string doc_url = 6;
}

// ---------------------------------------------------------------------------
// Models — catalog reference data and user-enabled snapshots
// ---------------------------------------------------------------------------

enum MetadataSource {
  METADATA_SOURCE_UNSPECIFIED = 0;
  METADATA_SOURCE_CATALOG = 1;
  METADATA_SOURCE_DRIVER = 2;
  METADATA_SOURCE_MANUAL = 3;
}

message ModelCapabilities {
  bool streaming = 1;
  bool thinking = 2;
  bool tool_use = 3;
  bool vision = 4;
  bool prompt_caching = 5;
}

message ModelPricing {
  optional double input_per_million_tokens = 1;
  optional double output_per_million_tokens = 2;
  optional double cache_read_per_million_tokens = 3;
  optional double cache_write_per_million_tokens = 4;
}

// Read-only catalog provider entry (refreshed periodically from models.dev).
message CatalogModelProvider {
  string id = 1;
  string name = 2;
  optional string api_base = 3;
  optional string env_key = 4;
  optional string doc_url = 5;
  optional string npm = 6;
  google.protobuf.Timestamp fetched_at = 7;
}

// Read-only catalog model entry.
message CatalogModel {
  string provider_id = 1;           // catalog provider id
  string model_id = 2;
  string display_name = 3;
  optional int32 context_window = 4;
  optional int32 max_output_tokens = 5;
  optional ModelPricing pricing = 6;
  optional string knowledge_cutoff = 7;
  repeated string modalities = 8;
  optional ModelCapabilities capabilities = 9;
  google.protobuf.Timestamp fetched_at = 10;
}

// A user-enabled model on a configured provider. Metadata is snapshotted at
// enable time and editable thereafter; never auto-mutated by catalog refresh.
message UserModel {
  string user_model_provider_id = 1;
  string model_id = 2;

  string display_name = 3;
  optional int32 context_window = 4;
  optional int32 max_output_tokens = 5;
  optional ModelPricing pricing = 6;
  optional string knowledge_cutoff = 7;
  repeated string modalities = 8;
  optional ModelCapabilities capabilities = 9;
  optional CallSettings default_settings = 10;

  MetadataSource metadata_source = 11;
  google.protobuf.Timestamp metadata_snapshot_at = 12;
  google.protobuf.Timestamp enabled_at = 13;

  // When true, surface this model in the FAVORITES section at the top of
  // model pickers. Identity-style metadata, like profiles.favorite — does not
  // affect snapshotted catalog metadata.
  bool favorite = 14;
}

// Per-call provider settings.
message CallSettings {
  optional double temperature = 1;
  optional int32 max_output_tokens = 2;
  optional bool thinking_enabled = 3;
  optional int32 thinking_budget_tokens = 4;
  bytes extras = 5;          // provider-specific knobs not in the common set
}

// ---------------------------------------------------------------------------
// Profiles
// ---------------------------------------------------------------------------

enum CompressionMode {
  COMPRESSION_MODE_UNSPECIFIED = 0;
  COMPRESSION_MODE_REPLACE = 1;
  COMPRESSION_MODE_APPEND = 2;
}

message ProfileDefaults {
  optional string default_provider_id = 1;
  optional string default_model_id = 2;
  optional bool include_thinking_in_history = 3;
}

message Profile {
  string id = 1;
  optional string parent_profile_id = 2;
  string name = 3;

  // All optional: null means "inherit from parent."
  optional string system_message = 4;
  optional string default_user_message = 5;
  optional string compression_guide = 6;
  optional CompressionMode compression_mode = 7;
  optional string compression_provider_id = 8;
  optional string compression_model_id = 9;
  optional ProfileDefaults default_settings = 10;

  string owner_user_id = 13;
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp updated_at = 12;

  // Auto-title knobs. When all three resolve to non-null (with parent-chain
  // inheritance), the server fires an LLM call to generate a 2-5 word title
  // for the conversation (and per-context titles for new contexts) after
  // each first assistant turn. When any are unset post-resolution, title
  // generation is skipped — the feature is opt-in.
  optional string title_provider_id = 14;
  optional string title_model_id = 15;
  optional string title_guide = 16;

  // Sentinel naming a non-server title generator. NULL = "use the configured
  // (title_provider_id, title_model_id) cloud call." A non-null value names a
  // generator handled outside the server's stateless-provider title path.
  // v1 sentinel: "apple_foundation" — the Mac client uses Apple's on-device
  // FoundationModels framework (macOS 26+) to title locally; the server skips
  // its cloud roundtrip and the client persists via UpdateConversation.
  optional string title_provider_kind = 20;

  // Free-form description shown alongside `name` in pickers and the detail
  // viewer. Identity metadata — NOT inherited through the parent chain.
  // Empty string means "no description."
  string description = 17;

  // When true, the profile is hidden from the new-conversation picker and
  // only usable as a parent for inheritance. Defaults to false (chat-capable).
  bool parent_only = 18;

  // When true, surface this profile at the start of pickers. Identity
  // metadata — not inherited.
  bool favorite = 19;
}

// ---------------------------------------------------------------------------
// Conversation / Context / Message
// ---------------------------------------------------------------------------

message ConversationSettings {
  optional string default_provider_id = 1;
  optional string default_model_id = 2;
  optional bool include_thinking_in_history = 3;
}

message Conversation {
  string id = 1;
  string profile_id = 2;
  optional string title = 3;
  optional ConversationSettings settings = 4;
  string active_context_id = 5;
  string owner_user_id = 8;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message Context {
  string id = 1;
  string conversation_id = 2;
  optional string parent_context_id = 3;
  google.protobuf.Timestamp activation_time = 4;
  google.protobuf.Timestamp created_at = 5;
  // Server-tracked cursor: "the tip the user is currently viewing in this
  // context." Drives SendMessage's default parent. Null on fresh contexts and
  // immediately after compression.
  optional string current_leaf_message_id = 6;
  // Human-friendly title, populated by auto-title generation after the
  // first assistant turn lands in the context (when profile title settings
  // are configured). Editable via UpdateContext.
  optional string title = 7;
  // Total count of messages in this context (every role). Populated by
  // ListContexts; zero when retrieved via single-context RPCs that don't
  // aggregate.
  int32 message_count = 8;
  // Total tokens (input + output) reported by the most recent assistant
  // message in this context. Populated by ListContexts; zero when retrieved
  // via single-context RPCs that don't aggregate, or when the context
  // contains no assistant message with usage data yet.
  int64 last_message_total_tokens = 9;
  // Cumulative cost in USD across every message in this context (sum of
  // total_cost_usd over all messages, assistant + compression_summary alike).
  // Populated by ListContexts; zero when retrieved via single-context RPCs
  // that don't aggregate.
  double cumulative_cost_usd = 10;
}

enum MessageRole {
  MESSAGE_ROLE_UNSPECIFIED = 0;
  MESSAGE_ROLE_SYSTEM = 1;
  MESSAGE_ROLE_CONTEXT = 2;             // wire-mapped to user at send time
  MESSAGE_ROLE_USER = 3;
  MESSAGE_ROLE_ASSISTANT = 4;
  MESSAGE_ROLE_COMPRESSION_SUMMARY = 5; // assistant output of a compression turn,
                                        // recorded in the OLD context for audit/cost.
                                        // History-builder always skips this role.
}

message Message {
  string id = 1;
  string context_id = 2;
  optional string parent_id = 3;
  MessageRole role = 4;
  string content = 5;
  optional string raw_content = 6;
  bytes thinking = 7;
  optional string thinking_provider_type = 8;
  optional string thinking_rendered_text = 9;
  optional string provider_id = 10;
  optional string model_id = 11;
  google.protobuf.Timestamp created_at = 12;
  optional MessageUsage usage = 13;
  // Number of OTHER messages sharing this row's parent — i.e. branches
  // forking off the same parent. Populated only when returned via
  // ListMessages with leaf_message_id (the recursive CTE path); zero on
  // tree/list reads where forks would be visible directly.
  int32 sibling_count = 14;
  // Display-friendly rendering of `content` after running the active
  // profile's plugin DisplayTransformers. Server-side so display logic
  // isn't smeared across clients. When no DisplayTransformer applies (or
  // the plugin pipeline is empty), this is identical to `content`.
  string display_content = 15;
  // Set by EditMessage. UI shows "edited <relative time>" only when this
  // is non-null. Audit trail; doesn't affect history-builder output.
  optional google.protobuf.Timestamp edited_at = 16;
  // Human-readable error text when the stream that produced this message
  // terminated in errored/cancelled state. Non-null marks the message as a
  // failed turn: the UI renders it with a warning accent + the error text,
  // shows whatever partial content streamed before failure (still in
  // `content`), and exposes retry-from-here affordances. The full failure
  // payload — provider-specific raw fields — is preserved in the database
  // for debugging; only the human-readable string travels on the wire.
  optional string error_text = 17;
}

// MessageUsage records token usage reported by the provider plus the
// per-component cost computed at the moment of materialization (using the
// pricing snapshotted on user_models when the model was enabled).
message MessageUsage {
  optional int32 input_tokens = 1;
  optional int32 output_tokens = 2;
  optional int32 cache_read_tokens = 3;
  optional int32 cache_write_tokens = 4;
  optional int32 reasoning_tokens = 5;

  optional double input_cost_usd = 6;
  optional double output_cost_usd = 7;
  optional double cache_read_cost_usd = 8;
  optional double cache_write_cost_usd = 9;
  optional double total_cost_usd = 10;
}

// ---------------------------------------------------------------------------
// Streaming
// ---------------------------------------------------------------------------

enum StreamRunStatus {
  STREAM_RUN_STATUS_UNSPECIFIED = 0;
  STREAM_RUN_STATUS_RUNNING = 1;
  STREAM_RUN_STATUS_COMPLETED = 2;
  STREAM_RUN_STATUS_ERRORED = 3;
  STREAM_RUN_STATUS_CANCELLED = 4;
  STREAM_RUN_STATUS_INTERRUPTED = 5;
}

enum StreamRunPurpose {
  STREAM_RUN_PURPOSE_UNSPECIFIED = 0;
  STREAM_RUN_PURPOSE_ASSISTANT_RESPONSE = 1;
  STREAM_RUN_PURPOSE_COMPRESSION = 2;
}

message StreamRun {
  string id = 1;
  string conversation_id = 2;
  string context_id = 3;
  optional string parent_message_id = 4;
  string provider_id = 5;
  string model_id = 6;
  StreamRunStatus status = 7;
  StreamRunPurpose purpose = 8;
  google.protobuf.Timestamp started_at = 9;
  optional google.protobuf.Timestamp ended_at = 10;
  bytes error_payload = 11;
  optional string result_message_id = 12;
  optional string result_context_id = 13;
  // Cache observability for the chat-plugin pipeline. See
  // "Chat plugins → Cache observability" in docs/architecture.md.
  //
  // prefix_length: number of messages in the rendered wire-prefix.
  // cache_stable_prefix_length: positions whose hash matched the previous
  //   turn for this context. Null on the first turn (no comparison).
  // cache_trailing_depth: previous turn's prefix length minus
  //   stable_prefix_length — positions that fell out of cache between turns.
  //   Null on the first turn.
  optional int32 prefix_length = 14;
  optional int32 cache_stable_prefix_length = 15;
  optional int32 cache_trailing_depth = 16;
}

enum ChunkType {
  CHUNK_TYPE_UNSPECIFIED = 0;
  CHUNK_TYPE_TEXT_DELTA = 1;
  CHUNK_TYPE_THINKING_DELTA = 2;
  CHUNK_TYPE_TOOL_USE_START = 3;
  CHUNK_TYPE_TOOL_USE_DELTA = 4;
  CHUNK_TYPE_TOOL_USE_END = 5;
  CHUNK_TYPE_ERROR = 6;
  CHUNK_TYPE_DONE = 7;
  CHUNK_TYPE_USAGE = 8;
}

message Chunk {
  int64 sequence = 1;
  ChunkType type = 2;
  bytes payload = 3;
}

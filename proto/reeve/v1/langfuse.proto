syntax = "proto3";

package reeve.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/jdpedrie/reeve/gen/reeve/v1;reevev1";

// LangfuseService manages per-user Langfuse observability config —
// the credentials + master toggle that gate whether Reeve emits
// trace + generation events for the calling user's assistant turns.
//
// Storage: one row per user in user_langfuse_config (migration
// 00028). Credentials are AES-GCM encrypted at rest via the same
// cipher that protects user_model_providers.config. The integration
// is opt-in: a row only exists once the user touches Update, and
// Get returns a default-disabled shape when no row is present.
//
// Wire emit happens server-side via internal/langfuse.Emitter,
// hooked into the stream supervisor's post-materialize callback.
// All RPCs here only manage configuration — they don't fire test
// events except for the explicit TestLangfuseConfig RPC.
service LangfuseService {
  // GetLangfuseConfig returns the calling user's row, or a
  // zero-value shape (enabled=false) when no row exists. Never
  // returns NotFound — the absence of a row is a valid state the
  // settings page renders as "tracing not configured".
  //
  // The secret_key is NEVER returned to the client. Once the user
  // sets it, the value is write-only — the UI shows an opaque "•••"
  // placeholder and only accepts a new value on edit. Round-trip
  // editing of an existing row passes secret_key=nil, which the
  // server interprets as "leave unchanged."
  rpc GetLangfuseConfig(GetLangfuseConfigRequest) returns (GetLangfuseConfigResponse);

  // UpdateLangfuseConfig upserts the calling user's row. Sparse:
  // only set fields are written. Pass secret_key=nil to keep the
  // existing value (or to leave unset on first write — the UI
  // gates the enabled toggle off in that case server-side).
  rpc UpdateLangfuseConfig(UpdateLangfuseConfigRequest) returns (UpdateLangfuseConfigResponse);

  // DeleteLangfuseConfig removes the row entirely. After this, the
  // emitter forgets the user and turns are no longer traced. Use
  // when the user wants to fully sever the integration rather than
  // just disable it.
  rpc DeleteLangfuseConfig(DeleteLangfuseConfigRequest) returns (DeleteLangfuseConfigResponse);

  // TestLangfuseConfig fires one synthetic trace at the configured
  // host using the just-saved credentials and reports back whether
  // the POST succeeded. Used by the settings page's "Test"
  // button to surface auth / host typos before the user trusts
  // the integration with real conversation data.
  rpc TestLangfuseConfig(TestLangfuseConfigRequest) returns (TestLangfuseConfigResponse);
}

message LangfuseConfig {
  string host = 1;
  string public_key = 2;
  // True when a secret_key is currently stored on the row. The
  // value itself is never returned — clients render this as a
  // "credentials saved" indicator next to a "Replace" button.
  // Field name avoids `has_secret_key` because Swift Protobuf
  // auto-generates a `hasFoo` accessor for proto3 optionals,
  // which would collide.
  bool secret_key_set = 3;
  bool enabled = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
}

message GetLangfuseConfigRequest {}
message GetLangfuseConfigResponse {
  // Always present — when no row exists for the caller, the server
  // returns a zero-value config (host blank, enabled=false). Easier
  // for clients than special-casing absence.
  LangfuseConfig config = 1;
}

message UpdateLangfuseConfigRequest {
  // Sparse: any field left unset preserves the existing value.
  optional string host = 1;
  optional string public_key = 2;
  // optional secret_key: nil = leave unchanged; "" = clear; any
  // other value = encrypt + replace.
  optional string secret_key = 3;
  optional bool   enabled = 4;
}
message UpdateLangfuseConfigResponse {
  LangfuseConfig config = 1;
}

message DeleteLangfuseConfigRequest {}
message DeleteLangfuseConfigResponse {}

message TestLangfuseConfigRequest {}
message TestLangfuseConfigResponse {
  bool ok = 1;
  string error_message = 2;
  // Round-trip latency for the test ingestion POST. Useful UX
  // signal — slow Langfuse is still a working integration but the
  // user benefits from knowing.
  int64 latency_ms = 3;
}

syntax = "proto3";

package reeve.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/jdpedrie/reeve/gen/reeve/v1;reevev1";

// EmbedderService manages the per-user embedder config — which
// embedding backend the caller's messages are run through and which
// the memory plugin's search_history tool queries.
//
// Storage: one row per user in user_embedder_config (migration
// 00035). Non-secret fields (base_url, model, dimensions, type) live
// in a plaintext JSONB blob the Get RPC can echo back without
// decryption; the api_key is AES-GCM encrypted in its own column
// via the same cipher that protects user_model_providers.config.
//
// Wire effect: a non-empty saved config plus enabled=true enrolls
// the user in embeddings. The daemon-level Worker picks up their
// unembedded messages and the memory plugin's tool starts answering
// search_history calls. The user_embedder_config row is the on/off
// switch — REEVE_EMBEDDER stays a server-wide default for users
// without a row (single-tenant deploys).
service EmbedderService {
  // GetEmbedderConfig returns the calling user's row, or a zero-
  // value shape (type="openai", base_url + model + dim at the
  // OpenAI driver's defaults, enabled=false) when none exists.
  // Never returns NotFound — absence is rendered as the empty form
  // on the settings page.
  //
  // The api_key is NEVER returned; the response carries
  // api_key_set=true once the user has stored one. The UI shows a
  // "•••" placeholder and replaces only when the user types into
  // the field.
  rpc GetEmbedderConfig(GetEmbedderConfigRequest) returns (GetEmbedderConfigResponse);

  // UpdateEmbedderConfig upserts the calling user's row. Sparse on
  // edit (any unset optional preserves the existing value); first
  // write needs type + base_url + model + dimensions at minimum.
  //
  // api_key semantics: nil = leave unchanged; "" = clear (move back
  // to no-auth, e.g. switching from real OpenAI back to a local
  // Ollama); any other value = encrypt + replace.
  rpc UpdateEmbedderConfig(UpdateEmbedderConfigRequest) returns (UpdateEmbedderConfigResponse);

  // DeleteEmbedderConfig removes the row entirely. The user's
  // existing embeddings stay in place (we don't drop columns); the
  // worker just stops picking up new rows and the memory plugin
  // reports "search not configured" on tool-use. Re-enable by a
  // subsequent UpdateEmbedderConfig.
  rpc DeleteEmbedderConfig(DeleteEmbedderConfigRequest) returns (DeleteEmbedderConfigResponse);

  // TestEmbedderConfig fires one synthetic Embed("ping") at the
  // configured endpoint using the just-saved credentials and
  // reports back whether the round-trip worked. Used by the
  // settings page's "Test" button to surface base-URL or api_key
  // typos before the user trusts the integration.
  rpc TestEmbedderConfig(TestEmbedderConfigRequest) returns (TestEmbedderConfigResponse);

  // ListEmbedderTypes returns every registered embedder driver
  // (today just "openai"; future "voyage", "cohere" etc. drop in
  // the same registry). Drives the type-picker dropdown on the
  // settings page so the client doesn't have to hardcode the list.
  rpc ListEmbedderTypes(ListEmbedderTypesRequest) returns (ListEmbedderTypesResponse);

  // GetEmbedderStats returns counts for the "X / Y messages
  // embedded" progress chip — total messages of an embeddable
  // shape and how many are already embedded. Polled by the
  // settings page when an active backfill is in flight.
  rpc GetEmbedderStats(GetEmbedderStatsRequest) returns (GetEmbedderStatsResponse);
}

message EmbedderConfig {
  // Registered driver type (e.g. "openai"). Empty when no row
  // exists for the caller — the client renders the empty form
  // with the type dropdown defaulted to the first available.
  string type = 1;
  // Non-secret config — what the user sees on the settings page.
  string base_url = 2;
  string model = 3;
  int32  dimensions = 4;
  // True when an api_key is currently stored on the row. The value
  // itself is never returned; clients render this as "credentials
  // saved" next to a "Replace" button.
  bool   api_key_set = 5;
  bool   enabled = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

message GetEmbedderConfigRequest {}
message GetEmbedderConfigResponse {
  // Always present — zero-value when no row exists for the caller.
  EmbedderConfig config = 1;
}

message UpdateEmbedderConfigRequest {
  // Sparse: any unset optional preserves the existing value.
  optional string type = 1;
  optional string base_url = 2;
  optional string model = 3;
  optional int32  dimensions = 4;
  // api_key: nil = leave unchanged; "" = clear; any other value =
  // encrypt + replace.
  optional string api_key = 5;
  optional bool   enabled = 6;
}
message UpdateEmbedderConfigResponse {
  EmbedderConfig config = 1;
}

message DeleteEmbedderConfigRequest {}
message DeleteEmbedderConfigResponse {}

message TestEmbedderConfigRequest {}
message TestEmbedderConfigResponse {
  bool ok = 1;
  string error_message = 2;
  // Round-trip latency for the synthetic Embed call. Useful when
  // the embedder is local — a multi-second response means the
  // model isn't loaded yet and the user benefits from knowing.
  int64 latency_ms = 3;
}

message ListEmbedderTypesRequest {}
message ListEmbedderTypesResponse {
  // Sorted alphabetically for stable UI order.
  repeated string types = 1;
}

message GetEmbedderStatsRequest {}
message GetEmbedderStatsResponse {
  // Number of messages still waiting to be embedded for the calling
  // user. Decreases as the worker catches up.
  int32 unembedded_count = 1;
  // True when the worker is currently configured for this user
  // (config row exists + enabled=true OR a server-default embedder
  // is wired). When false, unembedded_count is the steady state —
  // no progress will be made until the user configures one.
  bool worker_active = 2;
}

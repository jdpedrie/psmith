syntax = "proto3";

package reeve.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/jdpedrie/reeve/gen/reeve/v1;reevev1";

// FilesService manages user-uploaded content-addressed files. Files
// are bound to messages via the `message_attachments` table at
// SendMessage time (see SendMessageRequest.attachment_file_ids in
// conversations.proto); the lifetime of the underlying bytes follows
// the FK chain (messages → message_attachments → files).
//
// Bytes are served outside the Connect-RPC envelope at the signed-URL
// HTTP endpoint `/files/{id}?token=…` — Connect's protocol overhead
// is unnecessary for a raw byte stream and most clients can route a
// signed URL straight into an <img src> / cached-image loader.
service FilesService {
  // UploadFile streams a single file's bytes to the server. The
  // client sends a Header message first (metadata), then one or more
  // Chunk messages (bytes), then closes the send side. The server
  // computes the SHA-256 as it goes, writes via the Storage backend,
  // and returns a single response with the resulting file_id.
  //
  // Idempotent on (user_id, sha256): re-uploading the same content
  // returns the existing file_id without rewriting the blob.
  //
  // Size cap: 50 MB enforced server-side (before any DB / Storage
  // writes). Larger uploads are rejected with InvalidArgument.
  rpc UploadFile(stream UploadFileRequest) returns (UploadFileResponse);

  // Mint a short-lived signed URL for the file_id. The URL points at
  // the `/files/{id}?token=…` HTTP endpoint on the same reeved and
  // is valid for ~30 seconds. Clients call this when they need to
  // render a thumbnail or trigger a download; the URL is HMAC-
  // signed so it can be passed to a system image-loader (or other
  // un-authenticated consumer) without leaking session credentials.
  rpc GetFileURL(GetFileURLRequest) returns (GetFileURLResponse);

  // ListFiles returns recent files owned by the caller. Used by the
  // "uploaded files" sidebar / picker. Bytes are not included —
  // clients use GetFileURL to fetch any specific file's content.
  rpc ListFiles(ListFilesRequest) returns (ListFilesResponse);
}

message UploadFileRequest {
  oneof body {
    UploadFileHeader header = 1;
    bytes chunk = 2;
  }
}

message UploadFileHeader {
  // MIME type of the bytes (e.g. "image/jpeg"). Used to derive the
  // attachment kind and to validate against the per-provider
  // capability table downstream.
  string mime_type = 1;
  // Total byte length of the upload. The server uses this for the
  // size-cap check up front so a too-large upload is rejected after
  // the header rather than after streaming the bytes.
  int64 size_bytes = 2;
  // Original filename — preserved for documents (rendered in the
  // download chip). Optional.
  optional string original_filename = 3;
}

message UploadFileResponse {
  string file_id = 1;
  string sha256 = 2;
  // Echoes the negotiated metadata so the client can verify what
  // the server stored (in particular when a re-upload deduped
  // against an existing row — the original filename / mime may
  // come from the prior upload).
  string mime_type = 3;
  int64 size_bytes = 4;
  optional string original_filename = 5;
  google.protobuf.Timestamp created_at = 6;
}

message GetFileURLRequest {
  string file_id = 1;
}

message GetFileURLResponse {
  // Fully-qualified URL the client can GET. Signed with an HMAC
  // over (file_id, user_id, expires_at); the bytes endpoint
  // verifies the signature before serving content.
  string url = 1;
  google.protobuf.Timestamp expires_at = 2;
}

message ListFilesRequest {
  optional int32 limit = 1;
}

message ListFilesResponse {
  repeated FileMeta files = 1;
}

message FileMeta {
  string id = 1;
  string sha256 = 2;
  string mime_type = 3;
  int64 size_bytes = 4;
  optional string original_filename = 5;
  google.protobuf.Timestamp created_at = 6;
}

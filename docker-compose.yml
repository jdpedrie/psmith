# Psmith single-host deployment: Postgres (pgvector) + the psmithd server.
#
# Quick start (full walkthrough in docs/operations/installation.md):
#   1. cp .env.example .env
#   2. edit .env: set POSTGRES_PASSWORD and PSMITH_MASTER_KEY
#      (generate a key with: openssl rand -base64 32)
#   3. docker compose -p psmith up -d
#   4. create the first user (psmithd has no signup); prompts for a password:
#      docker compose -p psmith exec psmithd psmith useradd -u <name>
#   5. open http://localhost:8080
#
# psmithd self-migrates on every start: the entrypoint runs `psmith install`,
# which creates the pgvector extension and applies the embedded schema
# migrations (idempotent). No separate migration step.
#
# The -p psmith flag names the compose project "psmith" (otherwise it takes
# the directory name). Use the same -p on every command.

services:
  db:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_USER: psmith
      # Required: set in .env. Postgres refuses to start if blank.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: psmith
    volumes:
      - db-data:/var/lib/postgresql
    healthcheck:
      # psmithd waits for this before starting (depends_on: service_healthy).
      test: ["CMD-SHELL", "pg_isready -U psmith -d psmith"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  psmithd:
    build: .
    image: psmith:latest
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Talk to the db service over the compose network. sslmode=disable is
      # fine on the private network; terminate TLS at a reverse proxy.
      PSMITH_DSN: postgres://psmith:${POSTGRES_PASSWORD}@db:5432/psmith?sslmode=disable
      PSMITH_ADDR: ":8080"
      # At-rest encryption key for provider API keys etc. Strongly
      # recommended and immutable: lose or change it and existing encrypted
      # rows can't be decrypted. Without it psmithd still starts but stores
      # secrets in plaintext (loud warning). Generate once, set in .env:
      #   openssl rand -base64 32
      PSMITH_MASTER_KEY: ${PSMITH_MASTER_KEY}
      PSMITH_DATA_DIR: /data
      # Absolute base URL clients prepend to signed file URLs. Set to your
      # public origin when behind a proxy (e.g. https://psmith.example.com).
      PSMITH_PUBLIC_BASE_URL: ${PSMITH_PUBLIC_BASE_URL:-}
      # Optional: auto-create an admin on first boot against an empty DB.
      PSMITH_BOOTSTRAP_ADMIN_USERNAME: ${PSMITH_BOOTSTRAP_ADMIN_USERNAME:-}
      PSMITH_BOOTSTRAP_ADMIN_PASSWORD: ${PSMITH_BOOTSTRAP_ADMIN_PASSWORD:-}
    ports:
      - "${PSMITH_PORT:-8080}:8080"
    volumes:
      - psmith-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  db-data:
  psmith-data:

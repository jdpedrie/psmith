# Spalt single-host deployment: Postgres (pgvector) + the spaltd server.
#
# Quick start (full walkthrough in docs/operations/installation.md):
#   1. cp .env.example .env
#   2. edit .env: set POSTGRES_PASSWORD and SPALT_MASTER_KEY
#      (generate a key with: openssl rand -base64 32)
#   3. docker compose -p spalt up -d
#   4. create the first user (spaltd has no signup); prompts for a password:
#      docker compose -p spalt exec spaltd spalt useradd -u <name>
#   5. open http://localhost:8080
#
# spaltd self-migrates on every start: the entrypoint runs `spalt install`,
# which creates the pgvector extension and applies the embedded schema
# migrations (idempotent). No separate migration step.
#
# The -p spalt flag names the compose project "spalt" (otherwise it takes
# the directory name). Use the same -p on every command.

services:
  db:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_USER: spalt
      # Required: set in .env. Postgres refuses to start if blank.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: spalt
    volumes:
      - db-data:/var/lib/postgresql
    healthcheck:
      # spaltd waits for this before starting (depends_on: service_healthy).
      test: ["CMD-SHELL", "pg_isready -U spalt -d spalt"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  spaltd:
    build: .
    image: spalt:latest
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Talk to the db service over the compose network. sslmode=disable is
      # fine on the private network; terminate TLS at a reverse proxy.
      SPALT_DSN: postgres://spalt:${POSTGRES_PASSWORD}@db:5432/spalt?sslmode=disable
      SPALT_ADDR: ":8080"
      # At-rest encryption key for provider API keys etc. Strongly
      # recommended and immutable: lose or change it and existing encrypted
      # rows can't be decrypted. Without it spaltd still starts but stores
      # secrets in plaintext (loud warning). Generate once, set in .env:
      #   openssl rand -base64 32
      SPALT_MASTER_KEY: ${SPALT_MASTER_KEY}
      SPALT_DATA_DIR: /data
      # Absolute base URL clients prepend to signed file URLs. Set to your
      # public origin when behind a proxy (e.g. https://spalt.example.com).
      SPALT_PUBLIC_BASE_URL: ${SPALT_PUBLIC_BASE_URL:-}
      # Optional: auto-create an admin on first boot against an empty DB.
      SPALT_BOOTSTRAP_ADMIN_USERNAME: ${SPALT_BOOTSTRAP_ADMIN_USERNAME:-}
      SPALT_BOOTSTRAP_ADMIN_PASSWORD: ${SPALT_BOOTSTRAP_ADMIN_PASSWORD:-}
    ports:
      - "${SPALT_PORT:-8080}:8080"
    volumes:
      - spalt-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  db-data:
  spalt-data:
